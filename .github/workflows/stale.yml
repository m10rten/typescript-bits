name: Close stale issues and PRs

on:
  schedule:
    - cron: "30 1 1,15 * *" # 1st and 15th of each month

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9.1.0
        with:
          stale-issue-message: >
            👋 This issue has been quiet for 90 days. If it's still relevant,
            please leave a comment to keep it open. Otherwise it will be
            closed in 14 days.
          stale-pr-message: >
            👋 This PR has been inactive for 60 days. If it's still being
            worked on, please address any review comments or leave an update.
            Otherwise it will be closed in 14 days.
          close-issue-message: >
            Closed as inactive. If this is still relevant, please comment
            and we'll reopen it.
          close-pr-message: >
            Closed as inactive. If you'd like to pick this up again, please
            reopen with an update on the current status.
          days-before-issue-stale: 90
          days-before-pr-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          remove-stale-when-updated: true
          exempt-issue-labels: needs-discussion,pinned,still-relevant
          exempt-pr-labels: pinned,waiting-for-review,still-relevant
